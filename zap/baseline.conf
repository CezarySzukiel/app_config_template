# OWASP ZAP baseline scan rule configuration.
#
# Format: <rule-id><tab><INFO|IGNORE|WARN|FAIL><tab><comment>
# Keep local-development defaults mostly as WARN so the scanner reports issues
# without blocking the first project bootstrap. Promote selected rules to FAIL
# in product repos when the team is ready to enforce them in CI.


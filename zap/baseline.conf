10021	WARN	X-Content-Type-Options header missing
10023	WARN	Debug error messages
10024	WARN	Sensitive information in URL
10025	WARN	Sensitive information in HTTP referrer
10027	WARN	Suspicious comments
10038	WARN	Content Security Policy header not set
10049	WARN	Storable but non-cacheable content

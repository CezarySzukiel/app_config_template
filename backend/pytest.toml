[pytest]
minversion = "9.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "-ra",
    "--strict-config",
    "--strict-markers",
    "--import-mode=importlib",
    "--durations=10",
    "--cov=__PACKAGE_NAME__",
    "--cov-branch",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=xml",
    "--no-cov-on-fail",
    "--timeout=20",
]
xfail_strict = true
markers = [
    "unit: fast, isolated tests validating a single unit",
    "integration: tests crossing module boundaries or adapters",
    "e2e: end-to-end workflows across the application stack",
    "slow: long-running tests excluded by default",
]
filterwarnings = [
    "error",
]

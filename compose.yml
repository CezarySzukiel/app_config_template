services:
  backend:
    build:
      context: ./backend
    working_dir: /workspace/backend
    volumes:
      - ./:/workspace
      - backend_venv:/workspace/backend/.venv
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["bash", "-lc", "uv sync --group dev && bash /workspace/scripts/tasks.sh check && tail -f /dev/null"]

  frontend:
    build:
      context: ./frontend
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "5173:5173"
    command: ["sh", "-c", "npm install && exec npm run dev -- --host 0.0.0.0"]

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  backend_venv:
  frontend_node_modules:
  db_data:

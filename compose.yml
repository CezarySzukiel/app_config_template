services:
  backend:
    build:
      context: ./backend
    working_dir: /workspace/backend
    volumes:
      - ./:/workspace
      - backend_venv:/workspace/backend/.venv
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["bash", "-lc", "uv sync --group dev && bash /workspace/scripts/tasks.sh check && tail -f /dev/null"]

  frontend:
    build:
      context: ./frontend
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: ["sh", "-c", "npm install --no-package-lock && exec npm run dev"]

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${APP_DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    network_mode: host
    depends_on:
      - frontend
    environment:
      ZAP_PORT: ${ZAP_PORT:-8080}
      ZAP_API_KEY: ${ZAP_API_KEY:-local-zap-change-me}
      ZAP_MCP_PORT: ${ZAP_MCP_PORT:-8282}
      ZAP_MCP_SECURITY_KEY: ${ZAP_MCP_SECURITY_KEY:-local-zap-mcp-change-me}
    volumes:
      - zap_home:/home/zap/.ZAP
      - ./zap/reports:/zap/wrk:rw
    command:
      - bash
      - -lc
      - |
        if ! /zap/zap.sh -cmd -addoninstall mcp; then
          if ! ls /home/zap/.ZAP/plugin/mcp-*.zap >/dev/null 2>&1; then
            echo "Could not install the official ZAP MCP add-on." >&2
            exit 1
          fi
        fi

        exec /zap/zap.sh -daemon \
          -host 127.0.0.1 \
          -port "$${ZAP_PORT}" \
          -config "api.key=$${ZAP_API_KEY}" \
          -config api.addrs.addr.name=127.0.0.1 \
          -config api.addrs.addr.regex=false \
          -config api.disablekey=false \
          -config "mcp.port=$${ZAP_MCP_PORT}" \
          -config mcp.securityKeyEnabled=true \
          -config "mcp.securityKey=$${ZAP_MCP_SECURITY_KEY}" \
          -config mcp.secureOnly=false \
          -config mcp.recordInHistory=false
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, urllib.parse, urllib.request; key=urllib.parse.quote(os.environ['ZAP_API_KEY']); port=os.environ['ZAP_PORT']; urllib.request.urlopen('http://127.0.0.1:%s/JSON/core/view/version/?apikey=%s' % (port, key), timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 20

  zap-baseline:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["tools"]
    depends_on:
      - frontend
    working_dir: /zap/wrk
    volumes:
      - ./zap:/zap/wrk:rw

  sonar-db:
    image: postgres:18
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql

  sonarqube:
    image: sonarqube:26.4.0.121862-community
    depends_on:
      - sonar-db
    ports:
      - "${SONAR_PORT:-9000}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:12.1.0.3225_8.0.1
    profiles: ["tools"]
    depends_on:
      - sonarqube
    working_dir: /usr/src
    volumes:
      - ./:/usr/src
      - sonar_scanner_cache:/opt/sonar-scanner/.sonar/cache
    environment:
      SONAR_HOST_URL: ${SONAR_HOST_URL:-http://sonarqube:9000}
      SONAR_TOKEN: ${SONAR_TOKEN:-}

  sonarqube-mcp:
    image: mcp/sonarqube:latest
    profiles: ["tools"]
    depends_on:
      - sonarqube
    ports:
      - "127.0.0.1:${SONAR_MCP_PORT:-8090}:8080"
    environment:
      SONARQUBE_TRANSPORT: http
      SONARQUBE_HTTP_HOST: 0.0.0.0
      SONARQUBE_HTTP_PORT: 8080
      SONARQUBE_URL: ${SONAR_HOST_URL:-http://sonarqube:9000}
      SONARQUBE_TOKEN: ${SONAR_MCP_USER_TOKEN:-}
      SONARQUBE_READ_ONLY: ${SONAR_MCP_READ_ONLY:-true}

volumes:
  backend_venv:
  frontend_node_modules:
  db_data:
  zap_home:
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_scanner_cache:
